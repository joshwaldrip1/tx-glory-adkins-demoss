<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Players — Texas Glory Adkins-DeMoss</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="btn">← Roster</a>
    <button class="btn" id="logout" style="margin-left:auto; background:var(--panel-2); color:var(--gold)">Log Out</button>
  </header>
  <main class="wrap">
    <h1 class="player-name"><span class="fn">My</span> <span class="ln">Players</span></h1>
    <p class="notice">Your player appears on the public roster as soon as you save.</p>
    <div id="mine"></div>
    <section class="panel">
      <h2 class="panel-title">Add / Edit Player</h2>
      <form id="form" class="panel-body" style="flex-direction:column">
        <input type="hidden" id="id">
        <div class="field"><label>First name</label><input id="first_name" required></div>
        <div class="field"><label>Last name</label><input id="last_name" required></div>
        <div class="field"><label>Jersey #</label><input id="jersey_number" type="number"></div>
        <div class="field"><label>Grad year</label><input id="grad_year" type="number"></div>
        <div class="field"><label>Positions (comma separated, e.g. P,3B)</label><input id="positions"></div>
        <div class="field"><label>Bats/Throws <span class="field-hint">bats / throws, e.g. R/R</span></label><input id="bats_throws" placeholder="R/R"></div>
        <div class="field"><label>Height</label><input id="height" placeholder="5'6&quot;"></div>
        <div class="field"><label>Weight</label><input id="weight" placeholder="140 lbs"></div>
        <div class="field"><label>Hometown</label><input id="hometown" placeholder="Mildred, TX"></div>
        <div class="field"><label>School</label><input id="school"></div>
        <div class="field"><label>Short bio / tagline <span class="field-hint">shown under the name</span></label><input id="about" placeholder="13U competing on a 16U showcase team"></div>
        <div class="field"><label>Commitment <span class="field-hint">e.g. Uncommitted, or Committed – XYZ University</span></label><input id="commitment" placeholder="Uncommitted"></div>
        <div class="field"><label>Bat / Glove / Throws detail <span class="field-hint">e.g. RHT / LHB, -10 bat</span></label><input id="bat_glove"></div>
        <div class="field"><label>Travel organization</label><input id="travel_org" placeholder="TX Glory Adkins DeMoss"></div>
        <div class="field"><label>HS / Travel coach <span class="field-hint">name + contact</span></label><input id="hs_coach"></div>
        <div class="field"><label>NCSA ID</label><input id="ncsa_id"></div>
        <div class="field"><label>SportsRecruits ID</label><input id="sportsrecruits_id"></div>
        <div class="field"><label>GameChanger ID</label><input id="gamechanger_id"></div>
        <h3 class="panel-title" style="margin-top:18px">Stats — fill in only what applies</h3>
        <p class="notice">Every stat is optional. Anything you leave blank simply won't show on the profile. Tap a category to expand it.</p>
        <div id="stat-groups"></div>
        <h3 class="panel-title" style="margin-top:18px">Academics &amp; Awards</h3>
        <div class="field"><label>GPA</label><input id="gpa" placeholder="3.80"></div>
        <div class="field"><label>Honor roll</label><input id="honor_roll" placeholder="All A's"></div>
        <div class="field"><label>Academic awards <span class="field-hint">comma separated</span></label><input id="awards" placeholder="Mathematics Award, Honor Roll"></div>
        <div class="field"><label>Athletic awards / achievements <span class="field-hint">comma separated</span></label><input id="achievements" placeholder="USSSA All-State, Silver Slugger"></div>
        <div class="field"><label>Academic interests <span class="field-hint">comma separated</span></label><input id="interests" placeholder="Nursing, Business"></div>
        <h3 class="panel-title" style="margin-top:18px">Media &amp; Contact</h3>
        <div class="field"><label>Highlight video URL (YouTube/Hudl)</label><input id="video_url"></div>
        <div class="field"><label>Guardian name</label><input id="guardian_name" required></div>
        <div class="field"><label>Guardian email</label><input id="guardian_email" type="email" required></div>
        <div class="field"><label>Guardian phone</label><input id="guardian_phone"></div>
        <div class="field"><label>Player photo</label><input id="photo" type="file" accept="image/*"></div>
        <button class="btn" type="submit">Save &amp; Publish</button>
        <p id="msg"></p>
      </form>
    </section>
  </main>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
